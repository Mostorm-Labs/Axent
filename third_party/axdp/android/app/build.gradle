plugins {
    id 'com.android.application'
}

android {
    namespace 'com.auditoryworks.axdp'
    compileSdk 32

    defaultConfig {
        applicationId "com.auditoryworks.axdp"
        minSdk 23
        targetSdk 32
        versionCode 1
        versionName "1.1.2"
        ndk {
                abiFilters 'arm64-v8a', 'armeabi-v7a'
        }
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        // release {
        //     minifyEnabled false
        //     proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        // }
        debug {
            debuggable true
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    externalNativeBuild {
        cmake {
            path file('src/main/cpp/CMakeLists.txt')
            version '3.18.1'
        }
    }
    buildFeatures {
        viewBinding true
    }

    applicationVariants.all { variant ->
        variant.outputs.all {
            def fileName = 'axdp-service-' + variant.name + '-V' + defaultConfig.versionName + ".apk"
            outputFileName = fileName
        }
    }

    signingConfigs {
        release {
            storeFile file('..\\xbh.jks')
            storePassword 'android'
            keyAlias 'android'
            keyPassword 'android'
        }

        debug {
            storeFile file('..\\xbh.jks')
            storePassword 'android'
            keyAlias 'android'
            keyPassword 'android'
        }
    }
}

dependencies {

    implementation 'androidx.appcompat:appcompat:1.4.1'
    implementation 'com.google.android.material:material:1.5.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.3'
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.3'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.4.0'

    implementation 'com.squareup.okhttp3:okhttp:3.10.0'

    implementation fileTree(include: ['*.aar'], dir: 'libs')

    compileOnly files('libs/WifiAp8.jar')
    compileOnly files('libs/framework.jar')
    implementation files('libs/xbh-sdk-release-v3.1.1.301-20220110.jar')
}